<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
    }

    #franja {
      height: 8px;
      width: 100%;
    }

    .contenido {
      padding: 20px;
    }

    #icono {
      font-size: 48px;
      text-align: center;
      margin-bottom: 12px;
    }

    #ambiente {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    #url {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-bottom: 16px;
    }

    #razon {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #ccc;
      border-left: 3px solid #444;
    }
  </style>
</head>
<body>
  <div id="franja"></div>

  <div class="contenido">
    <div id="icono">⏳</div>
    <div id="ambiente">Detectando...</div>
    <div id="url"></div>
    <div id="razon">Analizando la URL...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
